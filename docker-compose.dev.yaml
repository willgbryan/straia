services:
  postgres:
    build:
      context: dev/postgresql
      dockerfile: Dockerfile
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: 'briefer'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'password'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d briefer || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  db_migration:
    build:
      context: '.'
      dockerfile: 'apps/api/Dockerfile'
    working_dir: '/app/packages/database'
    command: ['npx', 'prisma', 'migrate', 'deploy']
    environment:
      NODE_ENV: 'development'
      POSTGRES_PRISMA_URL: 'postgresql://postgres:password@postgres:5432/briefer?schema=public'
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: '.'
      dockerfile: 'apps/api/Dockerfile'
    environment:
      NODE_ENV: 'development'
      LOG_LEVEL: 'debug'
      API_URL: 'http://localhost:8080'
      FRONTEND_URL: 'http://localhost:4000'
      LOGIN_JWT_SECRET: ${LOGIN_JWT_SECRET:-$(openssl rand -hex 24)}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-$(openssl rand -hex 24)}
      AI_API_URL: 'http://localhost:8000'
      AI_API_USERNAME: ${AI_BASIC_AUTH_USERNAME:-admin}
      AI_API_PASSWORD: ${AI_BASIC_AUTH_PASSWORD:-password}
      PYTHON_ALLOWED_LIBRARIES: 'plotly,matplotlib,numpy,pandas'
      POSTGRES_USERNAME: 'postgres'
      POSTGRES_PASSWORD: 'password'
      POSTGRES_HOSTNAME: 'postgres'
      POSTGRES_PORT: '5432'
      POSTGRES_DATABASE: 'briefer'
      ENVIRONMENT_VARIABLES_ENCRYPTION_KEY: ${ENVIRONMENT_VARIABLES_ENCRYPTION_KEY:-$(openssl rand -hex 32)}
      WORKSPACE_SECRETS_ENCRYPTION_KEY: ${WORKSPACE_SECRETS_ENCRYPTION_KEY:-$(openssl rand -hex 32)}
      DATASOURCES_ENCRYPTION_KEY: ${DATASOURCES_ENCRYPTION_KEY:-$(openssl rand -hex 32)}
      JUPYTER_HOST: 'jupyter_server'
      JUPYTER_PORT: 8888
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:?error}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      db_migration:
        condition: service_completed_successfully
      jupyter_server:
        condition: service_healthy

  jupyter_server:
    labels:
      'cloud.briefer.jupyter-container': 'true'
    build:
      context: 'apps/api'
      dockerfile: 'jupyter.Dockerfile'
    command:
      - 'sh'
      - '-c'
      - 'jupyter server --ip=0.0.0.0 --ZMQChannelsWebsocketConnection.iopub_data_rate_limit=1.0e10 --ZMQChannelsWebsocketConnection.iopub_msg_rate_limit=1.0e6 --ServerApp.max_body_size=107374182400'
    ports:
      - '8888:8888'
    environment:
      # Use passed value
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:?error}
    volumes:
      - ./jupyterfiles:/home/jupyteruser
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8888/api || exit 1']
      interval: 5s
      timeout: 10s
      retries: 5

  ecommerce:
    build: data/psql/ecommerce
    restart: always
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: 'ecommerce'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'password'
    volumes:
      - ecommerce_data:/var/lib/postgresql/data

  haproxy:
    image: haproxy:3.0
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - '8080:8080'
    depends_on:
      - api

volumes:
  postgres_dev_data:
  ecommerce_data:
